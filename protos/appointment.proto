syntax = "proto3";

package appointment;

service AppointmentService {
  rpc CreateAppointment (CreateAppointmentRequest) returns (AppointmentResponse);
  rpc GetAppointment (GetAppointmentRequest) returns (AppointmentResponse);
  rpc GetAllAppointments (Empty) returns (AppointmentList);
  rpc CancelAppointment (GetAppointmentRequest) returns (AppointmentResponse);
  rpc GetAppointmentsByPatient (GetAppointmentsByPatientRequest) returns (AppointmentList);
  rpc GetAppointmentsByDoctor (GetAppointmentsByDoctorRequest) returns (AppointmentList);
}

message Empty {}

message CreateAppointmentRequest {
  int32 patient_id = 1;
  int32 doctor_id = 2;
  string date = 3;
  string time = 4;
}

message GetAppointmentRequest {
  int32 id = 1;
}

message GetAppointmentsByPatientRequest {
  int32 patient_id = 1;
}

message GetAppointmentsByDoctorRequest {
  int32 doctor_id = 1;
}

message AppointmentResponse {
  int32 id = 1;
  int32 patient_id = 2;
  int32 doctor_id = 3;
  string date = 4;
  string time = 5;
  string status = 6;
}

message AppointmentList {
  repeated AppointmentResponse appointments = 1;
}